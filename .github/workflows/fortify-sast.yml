name: Fortify SAST Scan

on:
  push:
    branches: [ "main" ]

jobs:
  Fortify-SAST:
    # 指定使用你在地端主機 A 設定的 Self-hosted Runner 標籤
    runs-on: fortify-scan-a 
    env:
      SSC_URL: http://192.168.11.128:8080/ssc
      SSC_TOKEN: 74a482c9-40df-4445-b94b-ddc06f9a2bd3       # 建議使用 SSC CIToken
      APP_NAME: "eightball2"
      APP_VERSION: "1"

    steps:
      # 步驟 1: 下載源碼
      - name: Checkout Code
        uses: actions/checkout@v4

    # 步驟 2: 執行 SAST 掃描 (Fortify SCA)
      - name: Fortify SCA Scan
        shell: cmd
        run: |
          sourceanalyzer -b eightball2 -clean
          sourceanalyzer -b eightball2 . 
          sourceanalyzer -b eightball2 -scan -f eightball2.fpr -sc classic

    # 步驟 3: 使用 fcli 登入並上傳 fpr 到主機 B (SSC)
      - name: Upload to SSC
        shell: powershell  # 指定使用 powershell
        run: |
          # 登入 SSC
          fcli ssc session login --url $env:SSC_URL --token $env:SSC_TOKEN
          # 上傳FPR，並取得 artifactId
          $uploadJson = fcli ssc artifact upload -f eightball2.fpr --appversion "$($env:APP_NAME):$($env:APP_VERSION)" --output json
          $artifactId = ($uploadJson | ConvertFrom-Json).id
          Write-Host "Artifact uploaded with ID: $artifactId"
          # 執行自動核准
          Write-Host "Approving Artifact $artifactId..."
          fcli ssc artifact approve $artifactId -m="Auto-approved by GitHub Actions"
          
    # 步驟 4: 從 SSC 取得結果並轉換為 SARIF
      - name: Export SARIF from SSC
        run: |
          # 待上傳處理完成後，下載結果並轉為 GitHub 支援的 SARIF 格式
          # 注意：此步驟需確保 fcli 版本支援該指令，或使用 Fortify Vuln-Exporter 工具
          fcli ssc action run sarif-sast-report --appversion "$($env:APP_NAME):$($env:APP_VERSION)" --file eightball2.sarif

    # 步驟 5: 上傳 SARIF 檔案到 GitHub Security Tab
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eightball2.sarif

name: Fortify SAST Scan

on:
  push:
    branches: [ "main" ]

jobs:
  Fortify-SAST:
    # 指定使用你在地端主機 A 設定的 Self-hosted Runner 標籤
    runs-on: fortify-scan-a 

    steps:
      # 步驟 1: 下載源碼
      - name: Checkout Code
        uses: actions/checkout@v4

    # 步驟 2: 執行 SAST 掃描 (Fortify SCA)
      - name: Fortify SCA Scan
        shell: cmd
        run: |
          sourceanalyzer -b eightball -clean
          sourceanalyzer -b eightball . 
          sourceanalyzer -b eightball -scan -f eightball.fpr -sc classic
